# ========================================
#  GRAFANA VALUES - Secure Exam Platform
# ========================================
# Production-ready Grafana configuration
# ========================================

grafana:
  # Admin password configuration
  adminPassword: "admin123"
  
  # Disable environment file references to avoid GF_SECURITY_ADMIN_PASSWORD__FILE error
  env: {}
  envValueFrom: {}
  
  # Service configuration
  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000
  
  # Ingress configuration (optional)
  ingress:
    enabled: false
  
  # Persistence configuration
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: standard
  
  # Resource configuration
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  
  # Security configuration
  securityContext:
    runAsNonRoot: true
    runAsUser: 472
    fsGroup: 472
  
  # Sidecar configuration
  sidecar:
    datasources:
      enabled: false
    dashboards:
      enabled: false

# Prometheus configuration
prometheus:
  # Service configuration
  service:
    type: ClusterIP
    port: 9090
    targetPort: 9090
  
  # Resource configuration
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  
  # Persistence configuration
  server:
    persistentVolume:
      enabled: true
      size: 20Gi
      storageClassName: standard

# AlertManager configuration
alertmanager:
  enabled: true
  
  # Service configuration
  service:
    type: ClusterIP
    port: 9093
    targetPort: 9093
  
  # Resource configuration
  resources:
    limits:
      cpu: 200m
      memory: 200Mi
    requests:
      cpu: 100m
      memory: 100Mi

# Node Exporter configuration
nodeExporter:
  enabled: true
  
  # Resource configuration
  resources:
    limits:
      cpu: 200m
      memory: 200Mi
    requests:
      cpu: 100m
      memory: 100Mi

# Kube State Metrics configuration
kubeStateMetrics:
  enabled: true
  
  # Resource configuration
  resources:
    limits:
      cpu: 200m
      memory: 200Mi
    requests:
      cpu: 100m
      memory: 100Mi

# Default namespace
global:
  namespace: monitoring
