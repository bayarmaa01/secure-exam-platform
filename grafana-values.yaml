prometheus:
  enabled: true

alertmanager:
  enabled: true

grafana:
  enabled: true
  image:
    repository: grafana/grafana
    tag: "10.2.0"
    pullPolicy: IfNotPresent
  
  # Security context fixes for non-root policy compliance
  securityContext:
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472
  
  # Init container security context
  initChownData:
    enabled: true
    securityContext:
      runAsUser: 0
      runAsGroup: 0
  
  # Admin user configuration
  adminUser: admin
  adminPassword: admin123
  
  # Service configuration
  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000
  
  # Ingress (disabled for local deployment)
  ingress:
    enabled: false
  
  # Persistence
  persistence:
    enabled: true
    type: pvc
    accessModes:
      - ReadWriteOnce
    size: 2Gi
    storageClassName: standard
  
  # Data sources
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-server.monitoring.svc.cluster.local
          access: proxy
          isDefault: true
        - name: Alertmanager
          type: alertmanager
          url: http://alertmanager.monitoring.svc.cluster.local
          access: proxy
  
  # Dashboard providers
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
  
  # Dashboards
  dashboards:
    default:
      # Kubernetes overview dashboard
      kubernetes-overview:
        gnetId: 15757
        revision: 1
        datasource: Prometheus
      # Node exporter dashboard
      node-exporter:
        gnetId: 1860
        revision: 21
        datasource: Prometheus
  
  # Resources
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  
  # Readiness and liveness probes
  readinessProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  
  livenessProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  
  # Environment variables
  env:
    - name: GF_SECURITY_ADMIN_USER
      value: "admin"
    - name: GF_SECURITY_ADMIN_PASSWORD
      value: "admin123"
    - name: GF_INSTALL_PLUGINS
      value: "grafana-piechart-panel,grafana-worldmap-panel"
    - name: GF_PATHS_PLUGINS
      value: "/var/lib/grafana/plugins"
    - name: GF_PATHS_PROVISIONING
      value: "/etc/grafana/provisioning"

# Prometheus configuration
prometheus:
  prometheusSpec:
    retention: 30d
    resources:
      requests:
        memory: "400Mi"
        cpu: "200m"
      limits:
        memory: "800Mi"
        cpu: "500m"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 4Gi

# Node Exporter
nodeExporter:
  enabled: true
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

# AlertManager
alertmanager:
  enabled: true
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
