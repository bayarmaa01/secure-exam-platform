apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: exam-platform-ingress
  namespace: exam-platform
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx

  tls:
    - hosts:
        - exam-platform.local
      secretName: exam-platform-tls

  rules:
    - host: exam-platform.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 4000

          - path: /ai
            pathType: Prefix
            backend:
              service:
                name: ai-proctoring
                port:
                  number: 5000

          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80