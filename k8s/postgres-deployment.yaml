apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: exam-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      initContainers:
      - name: init-db
        image: postgres:16-alpine
        envFrom:
        - secretRef:
            name: exam-platform-secret
        command:
        - /bin/sh
        - -c
        - |
          echo "Initializing PostgreSQL..."
          # Check if data directory exists and is initialized
          if [ ! -f /var/lib/postgresql/data/pg_hba.conf ]; then
            echo "Fresh PostgreSQL installation detected"
            echo "Creating database with user: $POSTGRES_USER"
          else
            echo "Existing PostgreSQL data found"
            echo "Checking user credentials..."
          fi
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
          - secretRef:
              name: exam-platform-secret
          env:
            # Override specific PostgreSQL env vars from secret
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: exam-platform-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: exam-platform-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: exam-platform-secret
                  key: POSTGRES_DB
            # Additional configuration
            - name: POSTGRES_INITDB_ARGS
              value: "--auth-host=scram-sha-256"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - exam_user
                - -d
                - exam_platform
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - exam_user
                - -d
                - exam_platform
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: init-scripts
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: exam-platform
data:
  01-init.sql: |
    -- Initialize database with proper extensions and permissions
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "pg_stat_statements";
    
    -- Create additional schemas if needed
    -- CREATE SCHEMA IF NOT EXISTS exam_schema;
    
    -- Set default permissions for the user
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO exam_user;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO exam_user;
    
    -- Grant explicit permissions
    GRANT ALL PRIVILEGES ON DATABASE exam_platform TO exam_user;
    
    -- Log initialization
    DO $$
    BEGIN
      RAISE NOTICE 'Database initialized successfully for user: %', current_user;
    END $$;
  02-check-user.sql: |
    -- Verify user exists and has correct permissions
    DO $$
    BEGIN
      IF EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'exam_user') THEN
        RAISE NOTICE 'User exam_user exists and is properly configured';
      ELSE
        RAISE NOTICE 'Creating exam_user user';
      END IF;
    END $$;
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: exam-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: standard
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: exam-platform
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP
