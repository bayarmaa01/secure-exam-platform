apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: exam-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      initContainers:
      - name: init-db
        image: postgres:16-alpine
        envFrom:
        - secretRef:
            name: exam-platform-secret
        command:
        - /bin/sh
        - -c
        - |
          echo "Initializing PostgreSQL..."
          # Check if data directory exists and is initialized
          if [ ! -f /var/lib/postgresql/data/pg_hba.conf ]; then
            echo "Fresh PostgreSQL installation detected"
            echo "Creating database with user: $POSTGRES_USER"
          else
            echo "Existing PostgreSQL data found"
            echo "Checking user credentials..."
          fi
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
          - secretRef:
              name: exam-platform-secret
          env:
            # Override specific PostgreSQL env vars from secret
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: exam-platform-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: exam-platform-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: exam-platform-secret
                  key: POSTGRES_DB
            # Additional configuration
            - name: POSTGRES_INITDB_ARGS
              value: "--auth-host=scram-sha-256"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: init-scripts
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: exam-platform
data:
  01-init.sql: |
    -- Initialize database with proper extensions and permissions
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "pg_stat_statements";
    
    -- Create user and database if they don't exist
    DO $$
    BEGIN
      IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'exam_user') THEN
        CREATE ROLE exam_user LOGIN PASSWORD 'exam_password';
      END IF;
    END
    $$;
    
    -- Create database if it doesn't exist
    SELECT 'CREATE DATABASE exam_platform OWNER exam_user'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'exam_platform')\gexec
    
    -- Connect to the database and create schema
    \c exam_platform
    
    -- Create tables
    CREATE TABLE IF NOT EXISTS users (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      email VARCHAR(255) UNIQUE NOT NULL,
      password_hash VARCHAR(255),
      name VARCHAR(255) NOT NULL,
      role VARCHAR(20) DEFAULT 'student' CHECK (role IN ('student', 'teacher', 'admin')),
      student_id VARCHAR(50),
      teacher_id VARCHAR(50),
      created_at TIMESTAMP DEFAULT NOW()
    );
    
    CREATE TABLE IF NOT EXISTS refresh_tokens (
      token VARCHAR(255) PRIMARY KEY,
      user_id UUID REFERENCES users(id),
      expires_at TIMESTAMP NOT NULL
    );
    
    CREATE TABLE IF NOT EXISTS exams (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      title VARCHAR(255) NOT NULL,
      description TEXT,
      type VARCHAR(20) DEFAULT 'mcq' CHECK (type IN ('mcq', 'written', 'coding', 'mixed', 'ai_proctored')),
      duration_minutes INT NOT NULL,
      start_time TIMESTAMP NOT NULL,
      end_time TIMESTAMP NOT NULL,
      difficulty VARCHAR(10) DEFAULT 'medium' CHECK (difficulty IN ('easy', 'medium', 'hard')),
      total_marks INT DEFAULT 100,
      passing_marks INT DEFAULT 50,
      is_published BOOLEAN DEFAULT false,
      teacher_id UUID REFERENCES users(id),
      fullscreen_required BOOLEAN DEFAULT false,
      tab_switch_detection BOOLEAN DEFAULT false,
      copy_paste_blocked BOOLEAN DEFAULT false,
      camera_required BOOLEAN DEFAULT false,
      face_detection_enabled BOOLEAN DEFAULT false,
      shuffle_questions BOOLEAN DEFAULT false,
      shuffle_options BOOLEAN DEFAULT false,
      assign_to_all BOOLEAN DEFAULT true,
      assigned_groups JSONB DEFAULT '[]'::jsonb,
      status VARCHAR(20) DEFAULT 'draft' CHECK (status IN ('draft', 'published', 'ongoing', 'completed')),
      created_at TIMESTAMP DEFAULT NOW(),
      updated_at TIMESTAMP DEFAULT NOW()
    );
    
    -- Grant permissions to exam_user
    GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO exam_user;
    GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO exam_user;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO exam_user;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO exam_user;
    
    -- Log initialization
    DO $$
    BEGIN
      RAISE NOTICE 'Database initialized successfully for user: %', current_user;
    END $$;
  02-check-user.sql: |
    -- Verify user exists and has correct permissions
    DO $$
    BEGIN
      IF EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'postgres') THEN
        RAISE NOTICE 'User postgres exists and is properly configured';
      ELSE
        RAISE NOTICE 'Creating postgres user';
      END IF;
    END $$;
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: exam-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: standard
  # Allow PVC to be updated if it exists
  # This prevents the resize error
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: exam-platform
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP
