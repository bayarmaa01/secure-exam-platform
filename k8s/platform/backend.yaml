apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: exam-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: bayarmaa/exam-platform-backend:latest
        env:
        - name: PORT
          value: "4000"
        - name: DB_HOST
          value: postgres
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: exam_platform
        - name: DB_USER
          value: postgres
        - name: DB_PASSWORD
          value: postgres
        - name: JWT_SECRET
          value: change-me-in-production
        - name: REDIS_URL
          value: redis://redis:6379
        ports:
        - containerPort: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: exam-platform
spec:
  selector:
    app: backend
  ports:
  - port: 4000
    targetPort: 4000
