apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: exam-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        command:
        - '--config.file=/etc/prometheus/prometheus.yml'
        - '--storage.tsdb.path=/prometheus'
        - '--web.console.libraries=/etc/prometheus/console_libraries'
        - '--web.console.templates=/etc/prometheus/consoles'
        - '--storage.tsdb.retention.time=200h'
        - '--web.enable-lifecycle'
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: prometheus-config
          mountPath: /etc/prometheus
        - name: prometheus-storage
          mountPath: /prometheus
      volumes:
      - name: prometheus-config
        configMap:
          name: prometheus-config
      - name: prometheus-storage
        emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: exam-monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      - job_name: 'backend'
        static_configs:
          - targets: ['backend.exam-platform.svc.cluster.local:4000']
      - job_name: 'postgres'
        static_configs:
          - targets: ['postgres.exam-platform.svc.cluster.local:5432']
      - job_name: 'redis'
        static_configs:
          - targets: ['redis.exam-platform.svc.cluster.local:6379']
      - job_name: 'ai-proctoring'
        static_configs:
          - targets: ['ai-proctoring.exam-platform.svc.cluster.local:8000']
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: exam-monitoring
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
