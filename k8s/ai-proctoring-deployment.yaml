apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-proctoring
  namespace: exam-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-proctoring
  template:
    metadata:
      labels:
        app: ai-proctoring
    spec:
      containers:
      - name: ai-proctoring
        image: bayarmaa/exam-platform-ai-proctoring:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        - containerPort: 8001
          name: metrics
        env:
        # Standardized database credentials
        - name: DB_HOST
          value: postgres
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: exam-platform-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: exam-platform-secret
              key: DB_PASSWORD
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: exam-platform-secret
              key: DB_NAME
        # Connection URLs (fallback)
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: exam-platform-secret
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: exam-platform-secret
              key: REDIS_URL
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "Waiting for database to be ready..."
          until nc -z postgres 5432; do
            echo "Database not ready, waiting..."
            sleep 2
          done
          echo "Database is ready! Starting AI proctoring..."
          python main-free.py
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-proctoring
  namespace: exam-platform
spec:
  selector:
    app: ai-proctoring
  ports:
  - port: 5000
    targetPort: 5000
  type: ClusterIP