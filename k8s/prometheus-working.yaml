apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: exam-monitoring
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:v2.47.0
        args:
        - '--config.file=/etc/prometheus/prometheus.yml'
        - '--storage.tsdb.path=/prometheus'
        - '--web.console.libraries=/etc/prometheus/console_libraries'
        - '--web.console.templates=/etc/prometheus/consoles'
        - '--storage.tsdb.retention.time=200h'
        - '--web.enable-lifecycle'
        - '--web.enable-admin-api'
        ports:
        - containerPort: 9090
          name: web
        volumeMounts:
        - name: prometheus-config
          mountPath: /etc/prometheus
        - name: prometheus-storage
          mountPath: /prometheus
        readinessProbe:
          httpGet:
            path: /-/healthy
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: prometheus-config
        configMap:
          name: prometheus-config
      - name: prometheus-storage
        emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: exam-monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        monitor: 'exam-platform-monitor'
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
        metrics_path: /metrics
        scrape_interval: 15s
      - job_name: 'backend'
        static_configs:
          - targets: ['backend.exam-platform.svc.cluster.local:4000']
        metrics_path: /api/health
        scrape_interval: 15s
        scheme: http
      - job_name: 'ai-proctoring'
        static_configs:
          - targets: ['ai-proctoring.exam-platform.svc.cluster.local:8000']
        metrics_path: /health
        scrape_interval: 15s
        scheme: http
      - job_name: 'postgres'
        static_configs:
          - targets: ['postgres.exam-platform.svc.cluster.local:5432']
        scrape_interval: 30s
        scheme: http
      - job_name: 'redis'
        static_configs:
          - targets: ['redis.exam-platform.svc.cluster.local:6379']
        scrape_interval: 30s
        scheme: http
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: exam-monitoring
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
    name: web
  type: ClusterIP
