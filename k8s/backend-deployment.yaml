apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: exam-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
      - name: wait-for-db
        image: busybox:1.35
        envFrom:
        - secretRef:
            name: exam-platform-secret
        command:
        - sh
        - -c
        - 'until nc -z postgres 5432; do echo waiting for db; sleep 5; done;'
      - name: wait-for-redis
        image: busybox:1.35
        envFrom:
        - secretRef:
            name: exam-platform-secret
        command:
        - sh
        - -c
        - 'until nc -z redis 6379; do echo waiting for redis; sleep 5; done;'
      containers:
      - name: backend
        image: backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 4000
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - secretRef:
            name: exam-platform-secret
        env:
          # Override specific env vars from secret
          - name: DB_HOST
            valueFrom:
              secretKeyRef:
                name: exam-platform-secret
                key: DB_HOST
          - name: DB_PORT
            valueFrom:
              secretKeyRef:
                name: exam-platform-secret
                key: DB_PORT
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: exam-platform-secret
                key: DB_USER
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: exam-platform-secret
                key: DB_PASSWORD
          - name: DB_NAME
            valueFrom:
              secretKeyRef:
                name: exam-platform-secret
                key: DB_NAME
          - name: REDIS_HOST
            valueFrom:
              secretKeyRef:
                name: exam-platform-secret
                key: REDIS_HOST
          - name: REDIS_PORT
            valueFrom:
              secretKeyRef:
                name: exam-platform-secret
                key: REDIS_PORT
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: exam-platform-secret
                key: DATABASE_URL
          - name: REDIS_URL
            valueFrom:
              secretKeyRef:
                name: exam-platform-secret
                key: REDIS_URL
          - name: JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: exam-platform-secret
                key: JWT_SECRET
          - name: JWT_REFRESH_SECRET
            valueFrom:
              secretKeyRef:
                name: exam-platform-secret
                key: JWT_REFRESH_SECRET
          # Environment
          - name: NODE_ENV
            value: "production"
          - name: PORT
            value: "4000"
          # Database connection retry settings
          - name: DB_RETRY_ATTEMPTS
            value: "10"
          - name: DB_RETRY_DELAY
            value: "3000"
        readinessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
