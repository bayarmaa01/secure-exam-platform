apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: exam-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
      - name: wait-for-db
        image: postgres:16-alpine
        envFrom:
        - secretRef:
            name: exam-platform-secret
        command:
        - /bin/sh
        - -c
        - |
          echo "=== Backend Init Container ==="
          echo "Waiting for PostgreSQL to be ready..."
          
          # Wait for PostgreSQL port
          until nc -z $DB_HOST $DB_PORT; do
            echo "PostgreSQL not ready (port $DB_PORT), waiting..."
            sleep 2
          done
          echo "PostgreSQL port is open!"
          
          # Wait for database connection
          for i in {1..10}; do
            if PGPASSWORD=$DB_PASSWORD psql -h $DB_HOST -U $DB_USER -d $DB_NAME -c "SELECT 1;" >/dev/null 2>&1; then
              echo "PostgreSQL connection successful on attempt $i"
              exit 0
            else
              echo "PostgreSQL connection failed on attempt $i, retrying..."
              sleep 3
            fi
          done
          
          echo "ERROR: Could not connect to PostgreSQL after 10 attempts"
          exit 1
      - name: wait-for-redis
        image: busybox:1.35
        envFrom:
        - secretRef:
            name: exam-platform-secret
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for Redis to be ready..."
          until nc -z $REDIS_HOST $REDIS_PORT; do
            echo "Redis not ready (port $REDIS_PORT), waiting..."
            sleep 2
          done
          echo "Redis is ready!"
      containers:
      - name: backend
        image: backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 4000
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - secretRef:
            name: exam-platform-secret
        env:
          # Override specific env vars from secret
          - name: DB_HOST
            valueFrom:
              secretKeyRef:
                name: exam-platform-secret
                key: DB_HOST
          - name: DB_PORT
            valueFrom:
              secretKeyRef:
                name: exam-platform-secret
                key: DB_PORT
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: exam-platform-secret
                key: DB_USER
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: exam-platform-secret
                key: DB_PASSWORD
          - name: DB_NAME
            valueFrom:
              secretKeyRef:
                name: exam-platform-secret
                key: DB_NAME
          - name: REDIS_HOST
            valueFrom:
              secretKeyRef:
                name: exam-platform-secret
                key: REDIS_HOST
          - name: REDIS_PORT
            valueFrom:
              secretKeyRef:
                name: exam-platform-secret
                key: REDIS_PORT
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: exam-platform-secret
                key: DATABASE_URL
          - name: REDIS_URL
            valueFrom:
              secretKeyRef:
                name: exam-platform-secret
                key: REDIS_URL
          - name: JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: exam-platform-secret
                key: JWT_SECRET
          - name: JWT_REFRESH_SECRET
            valueFrom:
              secretKeyRef:
                name: exam-platform-secret
                key: JWT_REFRESH_SECRET
          # Environment
          - name: NODE_ENV
            value: "production"
          - name: PORT
            value: "4000"
          # Database connection retry settings
          - name: DB_RETRY_ATTEMPTS
            value: "10"
          - name: DB_RETRY_DELAY
            value: "3000"
        readinessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: exam-platform
spec:
  selector:
    app: backend
  ports:
  - port: 4000
    targetPort: 4000
    name: http
  - port: 9090
    targetPort: 9090
    name: metrics
  type: ClusterIP