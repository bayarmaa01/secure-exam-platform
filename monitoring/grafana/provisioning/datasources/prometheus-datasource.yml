apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "5s"
      queryTimeout: "60s"
      httpMethod: "POST"
    secureJsonData:
      httpHeaderValueName1: "Authorization"
      httpHeaderValueValue1: "Bearer ${PROMETHEUS_TOKEN}"
      tlsSkipVerify: true
