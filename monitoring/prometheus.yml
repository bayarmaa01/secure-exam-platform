global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'backend'
    static_configs:
      - targets: ['backend:4000']
    metrics_path: '/api/health'
    scrape_interval: 15s

  - job_name: 'ai-proctoring'
    static_configs:
      - targets: ['ai-proctoring:8000']
    metrics_path: '/health'
    scrape_interval: 15s
