prometheus:
  prometheusSpec:
    retention: 15d
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
    serviceMonitorSelectorNilUsesHelmValues: false
    # Ensure proper service discovery
    serviceAccountName: prometheus
    # Add readiness and liveness probes
    readinessProbe:
      httpGet:
        path: /-/ready
        port: 9090
      initialDelaySeconds: 30
      periodSeconds: 10
    livenessProbe:
      httpGet:
        path: /-/healthy
        port: 9090
      initialDelaySeconds: 60
      periodSeconds: 30

grafana:
  enabled: true
  adminPassword: admin123
  namespace: exam-monitoring
  # Fix datasource configuration
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-operated.exam-monitoring:9090
          access: proxy
          isDefault: true
  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 1Gi
  ingress:
    enabled: false
