version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "3005:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:4005/api
      - VITE_AI_URL=http://localhost:5005
    restart: unless-stopped
    networks:
      - exam-network

  backend:
    build: ./backend
    ports:
      - "4005:4000"
    environment:
      - PORT=4000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=exam_platform
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=change-me-in-production
      - JWT_REFRESH_SECRET=change-refresh-in-production
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://localhost:3005
      - AI_SERVICE_URL=http://ai-proctoring:5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - exam-network

  ai-proctoring:
    build: ./ai-proctoring
    ports:
      - "5005:8000"
    environment:
      - PORT=8000
      - MODEL_PATH=/app/models
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - exam-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=exam_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - exam-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - exam-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - exam-network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9092:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - exam-network

volumes:
  postgres_data:
  grafana_data:
  prometheus_data:

networks:
  exam-network:
    driver: bridge
