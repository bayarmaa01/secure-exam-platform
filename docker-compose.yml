services:
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
      - ai-proctoring
    restart: unless-stopped
    networks:
      - exam-network
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --no-verbose --tries=1 --spider http://localhost/health || curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://secure-exam.duckdns.org/api
        VITE_AI_URL: https://secure-exam.duckdns.org/ai
        VITE_ENVIRONMENT: production
    depends_on:
      - backend
      - ai-proctoring
    restart: unless-stopped
    networks:
      - exam-network
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --no-verbose --tries=1 --spider http://localhost/health.html || curl -f http://localhost/health.html || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      AI_SERVICE_URL: http://ai-proctoring:8000
      ALLOWED_ORIGINS: https://secure-exam.duckdns.org
      CORS_ORIGIN: https://secure-exam.duckdns.org
      DB_HOST: postgres
      DB_NAME: exam_platform
      DB_PASSWORD: SecureExamPlatform2024!
      DB_PORT: '5432'
      DB_USER: postgres
      FRONTEND_URL: https://secure-exam.duckdns.org
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: SecureExamPlatformRefreshSecret2024!ProductionKey256BitsMinimum
      JWT_SECRET: SecureExamPlatformJWTSecret2024!ProductionKey256BitsMinimum
      NODE_ENV: production
      PORT: '4005'
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - exam-network
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --no-verbose --tries=1 --spider http://localhost:4005/health || curl -f http://localhost:4005/health || exit 1"]
      interval: 30s
      retries: 3
      start_period: 40s
      timeout: 10s

  ai-proctoring:
    build:
      context: ./ai-proctoring
      dockerfile: Dockerfile
    environment:
      MODEL_PATH: /app/models
      PORT: '8000'
      PYTHONPATH: /app
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - exam-network
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --no-verbose --tries=1 --spider http://localhost:8000/health || curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      retries: 3
      start_period: 40s
      timeout: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: exam_platform
      POSTGRES_PASSWORD: SecureExamPlatform2024!
      POSTGRES_USER: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - exam-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d exam_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - exam-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
      GF_SECURITY_ADMIN_PASSWORD: SecureGrafanaAdmin2024!
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: secure-exam.duckdns.org
      GF_SERVER_ROOT_URL: https://secure-exam.duckdns.org/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - exam-network
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    restart: unless-stopped
    networks:
      - exam-network
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
    restart: unless-stopped
    networks:
      - exam-network
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9100/metrics"]
      timeout: 10s

volumes:
  grafana_data:
  postgres_data:
  prometheus_data:
  redis_data:

networks:
  exam-network:
    driver: bridge