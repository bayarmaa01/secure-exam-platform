name: Secure Exam Platform Enterprise CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - 'helm/exam-platform/values.yaml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'helm/exam-platform/values.yaml'

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:

# -----------------------------
# 1️⃣ CODE QUALITY + TEST
# -----------------------------
  test:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_VERSION: '24'
    strategy:
      matrix:
        service: [frontend, backend, ai-proctoring]

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        if: matrix.service != 'ai-proctoring'
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Setup Python
        if: matrix.service == 'ai-proctoring'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install System Dependencies (AI Proctoring)
        if: matrix.service == 'ai-proctoring'
        run: |
          sudo apt-get update
          sudo apt-get install -y libjpeg-dev libpng-dev libtiff-dev

      - name: Install Dependencies
        run: |
          cd ${{ matrix.service }}
          if [ "${{ matrix.service }}" = "ai-proctoring" ]; then
            pip install --no-cache-dir -r requirements.txt
          else
            npm ci --prefer-offline --no-audit
          fi

      - name: Lint
        run: |
          cd ${{ matrix.service }}
          if [ "${{ matrix.service }}" = "ai-proctoring" ]; then
            echo "No linting configured for Python service"
          else
            npm run lint
          fi

      - name: Build
        run: |
          cd ${{ matrix.service }}
          if [ "${{ matrix.service }}" = "ai-proctoring" ]; then
            echo "No build step required for Python service"
          else
            npm run build
          fi

      - name: Test
        run: |
          cd ${{ matrix.service }}
          if [ "${{ matrix.service }}" = "ai-proctoring" ]; then
            python -m pytest test_main.py -v --tb=short
          else
            npm run test:ci
          fi

# -----------------------------
# 2️⃣ SONARCLOUD ANALYSIS
# -----------------------------
  sonarcloud:
    runs-on: ubuntu-latest
    needs: test
    name: SonarCloud Code Analysis

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

# -----------------------------
# 3️⃣ SECURITY SCAN
# -----------------------------
  security-scan:
    runs-on: ubuntu-latest
    needs: sonarcloud
    name: Container Security Scan

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: 0

# -----------------------------
# 3️⃣ BUILD & PUSH DOCKER
# -----------------------------
  docker-build:
    runs-on: ubuntu-latest
    needs: security-scan
    timeout-minutes: 45
    name: Build & Push Docker Images

    strategy:
      matrix:
        service: [frontend, backend, ai-proctoring]
        include:
          - service: frontend
            dockerfile: frontend/Dockerfile
            context: ./frontend
          - service: backend
            dockerfile: backend/Dockerfile
            context: ./backend
          - service: ai-proctoring
            dockerfile: ai-proctoring/Dockerfile
            context: ./ai-proctoring

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/exam-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


# -----------------------------
# 4. PIPELINE STATUS
# -----------------------------
  notify:
    runs-on: ubuntu-latest
    needs: docker-build
    if: always()

    steps:
      - name: Pipeline Result
        run: |
          echo " CI/CD Pipeline Completed Successfully!"
          echo " Images Built:"
          echo "📦 Images Built:"
          echo "   Frontend: ${{ env.IMAGE_PREFIX }}/exam-frontend:${{ env.IMAGE_TAG }}"
          echo "   Backend:  ${{ env.IMAGE_PREFIX }}/exam-backend:${{ env.IMAGE_TAG }}"
          echo "   AI:       ${{ env.IMAGE_PREFIX }}/exam-ai-proctor:${{ env.IMAGE_TAG }}"
          echo ""
          echo "🔄 ArgoCD will automatically detect changes and deploy"
          echo "📊 Check ArgoCD dashboard for deployment status"