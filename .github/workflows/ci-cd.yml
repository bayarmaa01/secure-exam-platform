name: Secure Exam Platform Enterprise CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - 'helm/exam-platform/values.yaml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'helm/exam-platform/values.yaml'

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:

# -----------------------------
# 1️⃣ CODE QUALITY + TEST
# -----------------------------
  test:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        service: [frontend, backend, ai-proctoring]

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: matrix.service != 'ai-proctoring'
        uses: actions/setup-node@v5
        with:
          node-version: '18'

      - name: Setup Python
        if: matrix.service == 'ai-proctoring'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          cd ${{ matrix.service }}
          if [ "${{ matrix.service }}" = "ai-proctoring" ]; then
            pip install -r requirements.txt
          else
            npm ci
          fi

      - name: Lint
        run: |
          cd ${{ matrix.service }}
          if [ "${{ matrix.service }}" = "ai-proctoring" ]; then
            echo "No linting configured for Python service"
          else
            npm run lint
          fi

      - name: Build
        run: |
          cd ${{ matrix.service }}
          if [ "${{ matrix.service }}" = "ai-proctoring" ]; then
            echo "No build step required for Python service"
          else
            npm run build
          fi

      - name: Test
        run: |
          cd ${{ matrix.service }}
          if [ "${{ matrix.service }}" = "ai-proctoring" ]; then
            python -m pytest test_main.py -v
          else
            npm run test:ci
          fi

# -----------------------------
# 2️⃣ SONARCLOUD ANALYSIS
# -----------------------------
  sonarcloud:
    runs-on: ubuntu-latest
    needs: test
    name: SonarCloud Code Analysis

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

# -----------------------------
# 3️⃣ SECURITY SCAN
# -----------------------------
  security-scan:
    runs-on: ubuntu-latest
    needs: sonarcloud
    name: Container Security Scan

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v5

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: 0

# -----------------------------
# 3️⃣ BUILD & PUSH DOCKER
# -----------------------------
  docker-build:
    runs-on: ubuntu-latest
    needs: security-scan
    name: Build & Push Docker Images

    strategy:
      matrix:
        service: [frontend, backend, ai-proctoring]
        include:
          - service: frontend
            dockerfile: frontend/Dockerfile
            context: ./frontend
          - service: backend
            dockerfile: backend/Dockerfile
            context: ./backend
          - service: ai-proctoring
            dockerfile: ai-proctoring/Dockerfile
            context: ./ai-proctoring

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/exam-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# -----------------------------
# 4️⃣ UPDATE HELM VALUES
# -----------------------------
  update-helm:
    runs-on: ubuntu-latest
    needs: docker-build
    name: Update Helm Values
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, 'Update Helm values for deployment')

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITOPS_PAT }}

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Update Helm Values
        run: |
          # Set image tag from short commit SHA
          IMAGE_TAG=${{ github.sha }}
          VALUES_PATH="helm/exam-platform/values.yaml"
          if [ ! -f "${VALUES_PATH}" ]; then
            echo "Helm values.yaml not found at ${VALUES_PATH}"
            exit 1
          fi

          awk -v prefix="${{ env.IMAGE_PREFIX }}" -v tag="${IMAGE_TAG}" '
          /^frontend:/ {section="frontend"; print; next}
          /^backend:/ {section="backend"; print; next}
          /^aiProctoring:/ {section="aiProctoring"; print; next}
          /^[a-zA-Z]/ && $0 !~ /:$/ {section=""}
          /repository:/ && section=="frontend" {$0="    repository: " prefix "/exam-frontend"}
          /tag:/ && section=="frontend" {$0="    tag: " tag}
          /repository:/ && section=="backend" {$0="    repository: " prefix "/exam-backend"}
          /tag:/ && section=="backend" {$0="    tag: " tag}
          /repository:/ && section=="aiProctoring" {$0="    repository: " prefix "/exam-ai-proctoring"}
          /tag:/ && section=="aiProctoring" {$0="    tag: " tag}
          {print}
          ' "${VALUES_PATH}" > "${VALUES_PATH}.tmp" && mv "${VALUES_PATH}.tmp" "${VALUES_PATH}"
          echo "Updated Helm values.yaml with new image tags"

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          # Add updated values.yaml
          git add helm/exam-platform/values.yaml
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit - image tags already up to date"
          else
            git commit -m "🚀 Update Helm values for deployment ${IMAGE_TAG} [skip ci]"
            git push
            echo "Helm values updated and pushed successfully"
          fi

# -----------------------------
# 5️⃣ PIPELINE STATUS
# -----------------------------
  notify:
    runs-on: ubuntu-latest
    needs: update-helm
    if: always()

    steps:
      - name: Pipeline Result
        run: |
          echo "🎉 CI/CD Pipeline Completed Successfully!"
          echo "📦 Images Built:"
          echo "   Frontend: ${{ env.IMAGE_PREFIX }}/exam-frontend:${{ env.IMAGE_TAG }}"
          echo "   Backend:  ${{ env.IMAGE_PREFIX }}/exam-backend:${{ env.IMAGE_TAG }}"
          echo "   AI:       ${{ env.IMAGE_PREFIX }}/exam-ai-proctor:${{ env.IMAGE_TAG }}"
          echo ""
          echo "🔄 ArgoCD will automatically detect changes and deploy"
          echo "📊 Check ArgoCD dashboard for deployment status"